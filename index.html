DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shree Sweets</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* Header */
header {
    background: #d32f2f;
    color: white;
    padding: 15px;
    text-align: center;
}

/* Hero Section */
.hero {
    background: url('https://images.unsplash.com/photo-1601050690597-df0568f70950') no-repeat center/cover;
    height: 300px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    font-weight: bold;
}

/* Menu */
.menu {
    padding: 20px;
    text-align: center;
}

.menu h2 {
    color: #d32f2f;
}

.items {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.item {
    border: 1px solid #ddd;
    border-radius: 10px;
    margin: 10px;
    padding: 15px;
    width: 200px;
}

.item img {
    width: 100%;
    border-radius: 10px;
}

/* Contact */
.contact {
    background: #f4f4f4;
    padding: 20px;
    text-align: center;
}

/* Footer */
footer {
    background: #333;
    color: white;
    text-align: center;
    padding: 10px;
}
</style>

</head>
<body>

<header>
    <h1>Shree Sweets 🍬</h1>
    <p>Fresh Mithai | Online Delivery Available</p>
</header>

<div class="hero">
    Delicious Sweets Delivered to Your Home
</div>

<section class="menu">
    <h2>Our Menu</h2>

    <div class="items">

        <div class="item">
            <img src="https://images.unsplash.com/photo-1631452180519-c014fe946bc7">
            <h3>Rasgulla</h3>
            <p>₹20 / piece</p>
        </div>

        <div class="item">
            <img src="https://images.unsplash.com/photo-1625944525903-bb2a1e84c7b7">
            <h3>Rasmalai</h3>
            <p>₹30 / piece</p>
        </div>

        <div class="item">
            <img src="https://images.unsplash.com/photo-1606890737304-57a1ca8a5b62">
            <h3>Barfi</h3>
            <p>₹25 / piece</p>
        </div>

    </div>
</section>

<section class="contact">
    <h2>Contact Us</h2>
    <p>📞 9301570370</p>
    <p>📍 Surkhi me XYZ ke paas</p>
</section>

<footer>
    <p>© 2026 Shree Sweets | All Rights Reserved</p>
</footer>

</body>
</html>
